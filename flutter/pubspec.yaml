name: wakeup_call
description: 절대 지각 방지 알람 앱 — 미기상 시 서버에서 직접 전화

publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP 통신
  dio: ^5.4.0
  # 로컬 스토리지
  shared_preferences: ^2.2.2
  # 백그라운드 작업 (센서 트래킹)
  workmanager: ^0.5.2
  # 센서 (자이로/가속도)
  sensors_plus: ^4.0.2
  # 로컬 알람 (백업용)
  flutter_local_notifications: ^17.0.0
  # 광고 (AdMob)
  google_mobile_ads: ^5.1.0
  # 상태 관리
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4
  # 라우팅
  go_router: ^13.2.0
  # 날짜/시간
  intl: ^0.19.0
  # 권한 요청
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/
