version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: wakeup_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wakeup_call
      POSTGRES_USER: wakeup
      POSTGRES_PASSWORD: wakeup_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/db/init.sql:/docker-entrypoint-initdb.d/init.sql

  # ── Redis (알람 큐) ────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: wakeup_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  # ── NestJS 서버 ────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: wakeup_server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://wakeup:wakeup_secret@postgres:5432/wakeup_call
      REDIS_URL: redis://redis:6379
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      PORT: 3001
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
